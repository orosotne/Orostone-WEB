        <h2>Čo je sinterovaný kameň?</h2>
        <p>Sinterovaný kameň je prémiový povrchový materiál vyrábaný pri teplote 1200°C a tlaku 5800 PSI z prírodných minerálov. Výsledkom je ultra-odolný materiál s takmer nulovou nasiakavosťou (&lt;0,1%), tvrdosťou 7-8 na Mohsovej stupnici a odolnosťou voči teplu, škrabancom, UV žiareniu a chemikáliám.</p>
